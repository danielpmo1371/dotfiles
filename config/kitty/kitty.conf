# Kitty Configuration
# Translated from Ghostty config

# No Kitty equivalent: custom-shader-animation = always
# Kitty does not support custom GLSL shaders.

font_family SF Mono
font_size 19
macos_thicken_font 0.75

# No Kitty equivalent: quick-terminal-animation-duration
# Kitty does not have a built-in quick/dropdown terminal feature.
# No Kitty equivalent: global:super+grave_accent=toggle_quick_terminal

cursor_shape block
shell_integration no-cursor
cursor_blink_interval 0
detect_urls yes

# No Kitty equivalent: window-inherit-working-directory
# Kitty inherits the working directory by default for new OS windows/tabs.
# No Kitty equivalent: window-inherit-font-size
# Kitty uses the configured font_size globally across all windows.

macos_titlebar_color system
strip_trailing_spaces always
mouse_hide_wait -1

# No Kitty equivalent: macos-titlebar-proxy-icon = hidden
# Kitty does not expose a proxy icon setting for the macOS titlebar.
# No Kitty equivalent: macos-icon = custom-style
# No Kitty equivalent: macos-icon-frame = plastic
# No Kitty equivalent: macos-icon-ghost-color = FFFFFF
# No Kitty equivalent: macos-icon-screen-color = 000000
# Kitty does not support custom app icon styling.

# Window padding (in pts) - top, right, bottom, left
window_padding_width 20

# Scrolling keybinds
# Page scrolling (standard terminal keybinds)
map shift+page_up scroll_page_up
map shift+page_down scroll_page_down

# Jump to top/bottom of scrollback
map shift+home scroll_home
map shift+end scroll_end

# Alternative vim-style scrolling
map ctrl+u scroll_page_up
map ctrl+d scroll_page_down

# Configure Option key as Meta for tmux prefix
macos_option_as_alt yes

# Decrease font size
map ctrl+minus change_font_size all -1.0
map cmd+backslash change_font_size all -1.0

# SSH TERM variable option
term xterm-256color

# ---------------------------------------------------------------------------
#   Map Command+<key> -> Ctrl+<key> for letters, digits, punctuation
# ---------------------------------------------------------------------------
map cmd+a send_text all \x01
map cmd+b send_text all \x02
map cmd+c send_text all \x03
map cmd+d send_text all \x04
map cmd+e send_text all \x05
map cmd+f send_text all \x06
map cmd+g send_text all \x07
map cmd+h send_text all \x08
map cmd+i send_text all \x09
map cmd+j send_text all \x0a
map cmd+k send_text all \x0b
map cmd+l send_text all \x0c
map cmd+m send_text all \x0d
map cmd+n send_text all \x0e
map cmd+o send_text all \x0f
map cmd+p send_text all \x10
map cmd+q send_text all \x11
map cmd+r send_text all \x12
map cmd+s send_text all \x13
map cmd+t send_text all \x14
map cmd+u send_text all \x15
map cmd+w send_text all \x17
map cmd+x send_text all \x18
map cmd+y send_text all \x19
map cmd+z send_text all \x1a
map cmd+1 send_text all \x11
map cmd+2 send_text all \x12
map cmd+3 send_text all \x13
map cmd+4 send_text all \x14
map cmd+5 send_text all \x15
map cmd+6 send_text all \x16
map cmd+7 send_text all \x17
map cmd+8 send_text all \x18
map cmd+9 send_text all \x19
map cmd+0 send_text all \x10
map cmd+grave_accent send_text all \x00
map cmd+minus send_text all \x0d

# Note: Command+E sends Ctrl+E (\x05) for tmux prefix (defined above in cmd+e)

# Suspend process (SIGTSTP)
map ctrl+z send_text all \x1a
map cmd+z send_text all \x1a

# ---------------------------------------------------------------------------
#   Tmux Window/Session Navigation with Cmd+Shift+h/j/k/l
# ---------------------------------------------------------------------------
# Map Cmd+[/] to escape sequences for Shift+Arrow keys
map cmd+[ send_text all \x1b[1;2D
map cmd+] send_text all \x1b[1;2C
map cmd+shift+[ send_text all \x1b[1;6D
map cmd+shift+] send_text all \x1b[1;6C
map cmd+shift+h send_text all \x1b[1;2D
map cmd+shift+l send_text all \x1b[1;2C
map cmd+shift+j send_text all \x1b[1;2B
map cmd+shift+k send_text all \x1b[1;2A
